<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYS.SNAKE_PROTOCOL // GLITCH_ART</title>
  
  <!-- Raw & Pixelated Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            pixel: ['VT323', 'monospace'],
            terminal: ['"Share Tech Mono"', 'monospace'],
          },
          colors: {
            cyan: { glitch: '#00FFFF' },
            magenta: { glitch: '#FF00FF' },
            black: { raw: '#050505' },
          },
          boxShadow: {
            'offset-cyan': '4px 4px 0px #00FFFF',
            'offset-magenta': '-4px 4px 0px #FF00FF',
            'offset-black': '4px 4px 0px #050505',
          },
          animation: {
            'flicker': 'flicker 0.15s infinite',
            'static-noise': 'noise 0.2s infinite',
            'score-glitch': 'score-glitch 0.3s steps(2, end)',
          },
          keyframes: {
            flicker: {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: 0.8 },
              '25%, 75%': { opacity: 0.2 },
            },
            'score-glitch': {
              '0%': { transform: 'translate(0)', color: '#00FFFF' },
              '25%': { transform: 'translate(-4px, 2px)', color: '#FF00FF' },
              '50%': { transform: 'translate(4px, -2px)', color: '#FFF' },
              '75%': { transform: 'translate(-2px, -4px)', color: '#FF00FF' },
              '100%': { transform: 'translate(0)', color: '#00FFFF' },
            }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* CSS Screen Tearing & Glitch Effects */
    body { 
      background-color: #050505; 
      margin: 0; 
      color: #fff;
    }

    /* Base64 Noise overlay for static TV effect */
    .bg-static {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
    }

    /* CRT Scanlines */
    .scanlines {
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
      background-size: 100% 4px;
      pointer-events: none;
    }

    /* Chromatic Aberration Text */
    .text-glitch {
      position: relative;
      color: white;
    }
    
    .text-glitch::before,
    .text-glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050505;
    }

    .text-glitch::before {
      left: 3px;
      text-shadow: -2px 0 #FF00FF;
      clip-path: inset(10% 0 60% 0);
      animation: tear-anim 3s infinite linear alternate-reverse;
    }

    .text-glitch::after {
      left: -3px;
      text-shadow: -2px 0 #00FFFF;
      clip-path: inset(80% 0 10% 0);
      animation: tear-anim-2 2s infinite linear alternate-reverse;
    }

    @keyframes tear-anim {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
      20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
      40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(3px, -2px); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-3px, 1px); }
      100% { clip-path: inset(30% 0 50% 0); transform: translate(2px, -1px); }
    }

    @keyframes tear-anim-2 {
      0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
      20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
      40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, 2px); }
      60% { clip-path: inset(20% 0 50% 0); transform: translate(-3px, -1px); }
      80% { clip-path: inset(50% 0 30% 0); transform: translate(3px, 1px); }
      100% { clip-path: inset(5% 0 80% 0); transform: translate(-2px, -2px); }
    }

    /* Terminal UI Elements */
    .border-terminal { border: 2px solid #333; }
    
    /* Digital Equalizer Bar Glitch */
    @keyframes eq-glitch {
      0% { height: 10%; background-color: #00FFFF; }
      25% { height: 90%; background-color: #00FFFF; }
      50% { height: 40%; background-color: #FF00FF; }
      75% { height: 100%; background-color: #fff; }
      100% { height: 20%; background-color: #00FFFF; }
    }
    .eq-bar { animation: eq-glitch 0.2s steps(2, end) infinite; }
    .eq-bar:nth-child(2) { animation-duration: 0.3s; animation-direction: reverse; }
    .eq-bar:nth-child(3) { animation-duration: 0.15s; }
    .eq-bar:nth-child(4) { animation-duration: 0.4s; animation-direction: reverse; }

    /* Custom Selection Colors */
    ::selection { background: #FF00FF; color: #000; }
  </style>
</head>
<body class="bg-static">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const GRID_SIZE = 20;
    const INITIAL_SNAKE = [{ x: 10, y: 10 }];
    const INITIAL_DIRECTION = { x: 0, y: -1 }; 
    const GAME_SPEED = 100; // Slightly faster, more erratic feel

    const PLAYLIST = [
      { id: 1, title: "DATA_CORRUPTION_A", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { id: 2, title: "NULL_POINTER_EXC", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { id: 3, title: "MEM_LEAK_WARNING", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
    ];

    // SVG Icons - Redesigned with sharp square linecaps/joins for a harsher feel
    const IconPlay = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const IconPause = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
    const IconSkipBack = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>;
    const IconSkipForward = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>;
    const IconVolume2 = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>;
    const IconVolumeX = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="square" strokeLinejoin="miter"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>;

    function NeonSnakePlayer() {
      const [snake, setSnake] = useState(INITIAL_SNAKE);
      const [direction, setDirection] = useState(INITIAL_DIRECTION);
      const [food, setFood] = useState({ x: 15, y: 5 });
      const [score, setScore] = useState(0);
      const [scorePop, setScorePop] = useState(false);
      const [gameOver, setGameOver] = useState(false);
      const [gameStarted, setGameStarted] = useState(false);
      const currentDirectionRef = useRef(INITIAL_DIRECTION);

      const [currentTrackIdx, setCurrentTrackIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isMuted, setIsMuted] = useState(false);
      const audioRef = useRef(null);

      // Score Glitch Trigger
      useEffect(() => {
        if (score > 0) {
          setScorePop(true);
          const timer = setTimeout(() => setScorePop(false), 300);
          return () => clearTimeout(timer);
        }
      }, [score]);

      const generateFood = useCallback((currentSnake) => {
        let newFood;
        while (true) {
          newFood = {
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE),
          };
          const onSnake = currentSnake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
          if (!onSnake) break;
        }
        return newFood;
      }, []);

      const resetGame = () => {
        setSnake(INITIAL_SNAKE);
        setDirection(INITIAL_DIRECTION);
        currentDirectionRef.current = INITIAL_DIRECTION;
        setScore(0);
        setGameOver(false);
        setGameStarted(true);
        setFood(generateFood(INITIAL_SNAKE));
        if (!isPlaying) togglePlay();
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
            e.preventDefault();
          }

          if (e.key === ' ' && (!gameStarted || gameOver)) {
            resetGame();
            return;
          }

          if (!gameStarted || gameOver) return;

          const { x, y } = currentDirectionRef.current;
          switch (e.key) {
            case 'ArrowUp':
            case 'w': if (y !== 1) setDirection({ x: 0, y: -1 }); break;
            case 'ArrowDown':
            case 's': if (y !== -1) setDirection({ x: 0, y: 1 }); break;
            case 'ArrowLeft':
            case 'a': if (x !== 1) setDirection({ x: -1, y: 0 }); break;
            case 'ArrowRight':
            case 'd': if (x !== -1) setDirection({ x: 1, y: 0 }); break;
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameStarted, gameOver]);

      useEffect(() => {
        if (!gameStarted || gameOver) return;

        const moveSnake = () => {
          setSnake((prevSnake) => {
            const head = prevSnake[0];
            const newHead = { x: head.x + direction.x, y: head.y + direction.y };

            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
              setGameOver(true); return prevSnake;
            }
            if (prevSnake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
              setGameOver(true); return prevSnake;
            }

            const newSnake = [newHead, ...prevSnake];
            if (newHead.x === food.x && newHead.y === food.y) {
              // Raw byte score logic
              setScore(s => s + 256);
              setFood(generateFood(newSnake));
            } else {
              newSnake.pop(); 
            }

            currentDirectionRef.current = direction; 
            return newSnake;
          });
        };

        const gameInterval = setInterval(moveSnake, GAME_SPEED);
        return () => clearInterval(gameInterval);
      }, [direction, food, gameStarted, gameOver, generateFood]);

      useEffect(() => {
        if (audioRef.current) {
          audioRef.current.muted = isMuted;
          if (isPlaying) audioRef.current.play().catch(e => console.log("Autoplay blocked:", e));
          else audioRef.current.pause();
        }
      }, [isPlaying, currentTrackIdx, isMuted]);

      const togglePlay = () => setIsPlaying(!isPlaying);
      const nextTrack = () => setCurrentTrackIdx((prev) => (prev + 1) % PLAYLIST.length);
      const prevTrack = () => setCurrentTrackIdx((prev) => (prev - 1 + PLAYLIST.length) % PLAYLIST.length);
      const toggleMute = () => setIsMuted(!isMuted);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden font-terminal">
          
          {/* Constant Fullscreen CRT Filter overlay */}
          <div className="fixed inset-0 scanlines z-50 pointer-events-none"></div>

          <div className="relative z-10 w-full max-w-4xl flex flex-col items-center gap-8">
            
            {/* Header Area */}
            <div className="flex flex-col sm:flex-row justify-between items-start w-full gap-6">
              
              {/* Title - Cryptic & Torn */}
              <div className="text-left w-full sm:w-auto">
                <h1 className="text-4xl sm:text-6xl font-pixel text-glitch tracking-widest font-bold uppercase m-0 leading-none" data-text="SYS.SNAKE_PROTOCOL">
                  SYS.SNAKE_PROTOCOL
                </h1>
                <p className="text-magenta-glitch bg-black-raw inline-block px-1 mt-2 text-xs uppercase tracking-[0.4em] font-bold border-l-4 border-cyan-glitch">
                  [KERNEL_PANIC // SUBROUTINE_0X4]
                </p>
              </div>

              {/* Data Readout / Scoreboard */}
              <div className="bg-black-raw p-3 border-2 border-cyan-glitch shadow-offset-magenta relative flex flex-col items-end min-w-[200px] shrink-0">
                <div className="text-xs text-white uppercase tracking-widest font-bold mb-1 w-full text-left border-b border-zinc-800 pb-1 flex justify-between">
                  <span>[BYTE_COUNT]</span>
                  <span className="text-magenta-glitch animate-flicker">REC</span>
                </div>
                <div 
                  className={`font-pixel text-5xl leading-none text-cyan-glitch mt-2 tracking-widest uppercase
                    ${scorePop ? 'animate-score-glitch text-white' : ''}`}
                >
                  0x{score.toString(16).padStart(4, '0')}
                </div>
              </div>
            </div>

            {/* Main Board Container */}
            <div className="relative group p-2 bg-black-raw border-4 border-zinc-800 shadow-offset-cyan">
              
              <div 
                className="w-[320px] h-[320px] sm:w-[500px] sm:h-[500px] bg-black-raw relative overflow-hidden"
                style={{ display: 'grid', gridTemplateColumns: `repeat(${GRID_SIZE}, 1fr)` }}
              >
                {/* Render Grid & Snake */}
                {Array.from({ length: GRID_SIZE * GRID_SIZE }).map((_, i) => {
                  const x = i % GRID_SIZE;
                  const y = Math.floor(i / GRID_SIZE);
                  const isHead = snake[0].x === x && snake[0].y === y;
                  const isBody = snake.some((s, idx) => idx !== 0 && s.x === x && s.y === y);
                  const isFood = food.x === x && food.y === y;

                  let cellClasses = "w-full h-full ";
                  
                  if (isHead) {
                    cellClasses += "bg-white z-10 animate-flicker shadow-[0_0_0_2px_#00FFFF] scale-[1.15]";
                  } else if (isBody) {
                    cellClasses += "bg-cyan-glitch scale-[0.85]";
                  } else if (isFood) {
                    cellClasses += "bg-magenta-glitch scale-[0.7] animate-[flicker_0.05s_infinite]";
                  } else {
                    cellClasses += "border border-[#111]";
                  }

                  return <div key={i} className={cellClasses} />;
                })}

                {/* Overlays / Screens */}
                {(!gameStarted || gameOver) && (
                  <div className="absolute inset-0 z-30 bg-black-raw/90 flex flex-col items-center justify-center p-6 text-center border-4 border-magenta-glitch m-4">
                    {gameOver && (
                      <h2 className="text-5xl font-pixel text-glitch text-white mb-2 uppercase" data-text="CRITICAL_ERR_0x00F">
                        CRITICAL_ERR_0x00F
                      </h2>
                    )}
                    
                    <p className="text-cyan-glitch mb-8 font-pixel text-3xl uppercase tracking-widest">
                      {gameOver ? `FINAL_DUMP: 0x${score.toString(16).padStart(4, '0')}` : 'AWAITING_EXECUTION_'}
                      <span className="animate-flicker text-white inline-block w-4 h-6 bg-white ml-2 align-middle"></span>
                    </p>
                    
                    <button 
                      onClick={resetGame} 
                      className="px-6 py-3 bg-transparent text-white font-bold tracking-widest border-2 border-cyan-glitch uppercase hover:bg-cyan-glitch hover:text-black-raw transition-none hover:shadow-offset-magenta focus:outline-none focus:ring-0 active:scale-95"
                    >
                      {gameOver ? '> FORCE_REBOOT()' : '> INIT_SEQUENCE()'}
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* Futuristic Terminal Music Player */}
            <div className="w-full bg-black-raw border-2 border-zinc-800 p-4 shadow-offset-magenta flex flex-col sm:flex-row items-center gap-6 relative">
              
              {/* Media Controls */}
              <div className="flex items-center gap-2 border-r border-zinc-800 pr-6">
                <button onClick={prevTrack} className="p-2 border border-zinc-700 text-zinc-500 hover:text-cyan-glitch hover:border-cyan-glitch active:bg-cyan-glitch active:text-black-raw transition-none">
                  <IconSkipBack />
                </button>
                
                <button 
                  onClick={togglePlay} 
                  className="w-12 h-12 flex items-center justify-center bg-transparent border-2 border-magenta-glitch text-magenta-glitch hover:bg-magenta-glitch hover:text-black-raw transition-none shadow-[2px_2px_0_#00FFFF] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none"
                >
                  {isPlaying ? <IconPause /> : <span className="ml-1"><IconPlay /></span>}
                </button>
                
                <button onClick={nextTrack} className="p-2 border border-zinc-700 text-zinc-500 hover:text-cyan-glitch hover:border-cyan-glitch active:bg-cyan-glitch active:text-black-raw transition-none">
                  <IconSkipForward />
                </button>
              </div>

              {/* Data & Equalizer Readout */}
              <div className="flex-1 w-full flex items-center gap-4">
                <div className="w-12 h-10 bg-black border border-zinc-700 flex items-end justify-center pb-1 gap-1 overflow-hidden shrink-0">
                  {isPlaying ? (
                    <>
                      <div className="w-1.5 eq-bar"></div>
                      <div className="w-1.5 eq-bar"></div>
                      <div className="w-1.5 eq-bar"></div>
                      <div className="w-1.5 eq-bar"></div>
                    </>
                  ) : (
                    <div className="w-8 h-[2px] bg-zinc-700 mb-1"></div>
                  )}
                </div>
                
                <div className="flex-1 overflow-hidden">
                  <div className="text-[10px] text-zinc-500 font-bold tracking-widest mb-1 uppercase flex justify-between">
                    <span>// STREAMING_DATA</span>
                    <span className="text-magenta-glitch">{PLAYLIST[currentTrackIdx].id}/3</span>
                  </div>
                  <div className="text-lg text-cyan-glitch font-pixel uppercase tracking-widest truncate">
                    > {PLAYLIST[currentTrackIdx].title}.wav
                  </div>
                </div>
              </div>

              {/* Volume Control */}
              <div className="pl-6 border-l border-zinc-800 hidden sm:block">
                <button onClick={toggleMute} className="p-2 border border-transparent text-zinc-500 hover:text-magenta-glitch hover:border-magenta-glitch transition-none">
                  {isMuted ? <IconVolumeX /> : <IconVolume2 />}
                </button>
              </div>

              <audio ref={audioRef} src={PLAYLIST[currentTrackIdx].url} onEnded={nextTrack} />
            </div>

            {/* Footer Commands */}
            <div className="text-center w-full hidden sm:block mt-2">
              <p className="text-zinc-500 text-xs tracking-widest uppercase">
                [INPUT_VECTORS]: <span className="text-white border border-zinc-600 px-1 bg-zinc-900">ARROWS</span> / <span className="text-white border border-zinc-600 px-1 bg-zinc-900">WASD</span>
                <span className="mx-4 text-zinc-700">||</span>
                [INTERRUPT]: <span className="text-cyan-glitch border border-cyan-glitch px-1 bg-cyan-900/20">SPACE</span>
              </p>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NeonSnakePlayer />);
  </script>
</body>
</html>
